<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDUvGF1V1s9faI3lmc9H8usu2HtTSz9Mds",
        authDomain: "pearrepostats.firebaseapp.com",
        projectId: "pearrepostats",
        storageBucket: "pearrepostats.firebasestorage.app",
        appId: "1:294950473076:web:ac034cd819aa839c647021"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const statsRef = doc(db, "stats", "global");

    onSnapshot(statsRef, (doc) => {
        if (doc.exists()) {
            const data = doc.data();
            const formatBytes = (b) => {
                if (b === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
                const i = Math.floor(Math.log(b) / Math.log(k));
                return parseFloat((b / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            };
            document.getElementById('contador-dinamico').innerText = data.total_downloads;
            document.getElementById('bytes-dinamico').innerText = formatBytes(data.total_bytes);
        }
    });

    window.registrarDescarga = async function(nombre, bytes) {
        try {
            await runTransaction(db, async (transaction) => {
                const sfDoc = await transaction.get(statsRef);
                transaction.update(statsRef, { total_bytes: (sfDoc.data().total_bytes || 0) + bytes, total_downloads: (sfDoc.data().total_downloads || 0) + 1 });
            });
        } catch (e) { console.error("Error al registrar:", e); }
    };
</script>
